name: SDK Integration Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate-consumer:
    name: Validate Downstream Consumer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          path: go-schwab-api-individual

      - name: Checkout Consumer
        uses: actions/checkout@v4
        with:
          repository: Chalupa-Tech/tayvens-stock-report
          path: tayvens-stock-report
          token: ${{ secrets.GH_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Validate Integration
        working-directory: go-schwab-api-individual
        run: |
          chmod +x scripts/validate_consumer.sh
          ./scripts/validate_consumer.sh ../tayvens-stock-report
