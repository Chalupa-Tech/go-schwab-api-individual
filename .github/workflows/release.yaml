name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Tidy modules
        run: go mod tidy

      - name: Verify clean modules
        run: |
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod or go.sum is not tidy. Please run 'go mod tidy' and commit the changes."
            git diff
            exit 1
          fi

      - name: Run Tests
        run: go test -v ./...

      - name: Run Reference Consumer Validation
        run: |
          chmod +x scripts/validate_sdk.sh
          ./scripts/validate_sdk.sh

      - name: Extract Release Data
        id: extract
        run: |
          VERSION=$(grep -m 1 "^## \[" CHANGELOG.md | sed -E 's/## \[([^]]+)\].*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          awk '/^## \[/{if (p) exit; p=1; next} p' CHANGELOG.md > release_notes.md
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.extract.outputs.version }}
          name: v${{ steps.extract.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          # note: this is a private release, so we don't publish to the go proxy
          # consumers must configure GOPRIVATE=github.com/Chalupa-Tech/*